services:
  mariadb:
    image: mariadb:12.3.1-ubi10-rc
    restart: unless-stopped
    env_file: stack.env
    volumes:
      - didjo_mariadb_data:/var/lib/mysql

  fastapi-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: stack.env
    depends_on:
      - mariadb
    ports:
      - "9441:9441"

volumes:
  didjo_mariadb_data: